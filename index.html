<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消消乐游戏 - 3D版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="container">
            <h1>🎮 消消乐 <span class="version">3D</span></h1>
            <div class="game-info">
                <div class="score-display">
                    <span class="score-label">分数</span>
                    <span id="score" class="score-value">0</span>
                </div>
                <div class="target-display">
                    <span class="target-label">目标</span>
                    <span id="target-score" class="target-value">5000</span>
                </div>
                <div class="moves-display">
                    <span class="moves-label">步数</span>
                    <span id="move-count" class="moves-value">0</span>
                </div>
            </div>
            
            <div class="board-wrapper">
                <div id="game-board"></div>
            </div>
            
            <div class="special-blocks-info">
                <p>特殊方块: 💣炸弹 | 🌈彩虹 | ↔️横消 | ↕️竖消 | 🌀漩涡</p>
                <p class="combo-hint">🌈+特殊方块 = 超级组合技！</p>
            </div>

            <!-- 新增：能量条 -->
            <div class="energy-bar-wrapper">
                <div class="energy-bar-container">
                    <div id="energy-bar" class="energy-bar-fill"></div>
                </div>
                <span id="energy-text" class="energy-text">0/100</span>
                <button id="energy-btn" class="energy-btn" disabled>⚡ 释放技能</button>
            </div>

            <div class="action-buttons">
                <button id="undo">↩️ 撤销</button>
                <button id="hint">💡 提示</button>
                <button id="restart">🔄 重新开始</button>
                <button id="sound-toggle">🔊 音效</button>
                <button id="leaderboard-btn">🏆 排行榜</button>
                <button id="achievements-btn">🎖️ 成就</button>
            </div>
        </div>
    </div>
    
    <!-- 排行榜模态框 -->
    <div id="leaderboard-modal" class="modal">
        <div class="modal-content">
            <h2>🏆 排行榜</h2>
            <ul id="leaderboard-list"></ul>
            <button class="modal-close">关闭</button>
        </div>
    </div>
    
    <!-- 成就模态框 -->
    <div id="achievements-modal" class="modal">
        <div class="modal-content">
            <h2>🎖️ 成就</h2>
            <ul id="achievements-list"></ul>
            <button class="modal-close">关闭</button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
